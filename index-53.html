<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#C9A84C">
<link rel="manifest" href="manifest.json">
<title>Gift Box</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#0d0d0d;min-height:100vh;color:#fff}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-8px)}}
.dot{width:7px;height:7px;border-radius:50%;background:#C9A84C;display:inline-block;animation:bounce 1s infinite}

/* Header */
#header{padding:52px 20px 20px;background:linear-gradient(180deg,#161616 0%,#0d0d0d 100%)}
#header .inner{max-width:480px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-start}
.greeting{font-size:13px;color:#aaa;margin-bottom:4px}
.title{font-size:24px;font-weight:800;color:#fff}
.subtitle{font-size:13px;color:#aaa;margin-top:2px}
.settings-btn{background:none;border:1px solid #333;border-radius:8px;color:#aaa;padding:6px 14px;font-size:12px;cursor:pointer;white-space:nowrap;margin-top:4px}

/* Summary */
#summary{max-width:480px;margin:16px auto 0;padding:0 20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sum-card{background:#161616;border:1px solid #222;border-radius:14px;padding:12px 14px}
.sum-label{font-size:10px;color:#888;margin-bottom:6px}
.sum-val{font-size:20px;font-weight:800;color:#fff}
.sum-sub{font-size:10px;color:#C9A84C;margin-top:3px}

/* Alert */
#alert-banner{max-width:480px;margin:12px auto 0;padding:0 20px;display:none}
#alert-inner{background:#1a0f00;border:1px solid #3a2200;border-radius:12px;padding:10px 14px;font-size:13px;color:#FF8C42}

/* Brand tabs */
#brand-wrap{overflow-x:auto;padding:16px 20px 0;max-width:480px;margin:0 auto}
#brand-wrap::-webkit-scrollbar{display:none}
#brands{display:flex;gap:8px;padding-bottom:4px}
.brand-btn{padding:6px 14px;border-radius:20px;border:1px solid #2a2a2a;white-space:nowrap;font-weight:600;font-size:13px;cursor:pointer;background:transparent;color:#666;display:flex;align-items:center;gap:6px}
.brand-btn.active{background:#C9A84C;color:#000;border-color:#C9A84C}
.brand-count{background:rgba(255,255,255,0.15);border-radius:10px;padding:1px 6px;font-size:11px}
.brand-btn.active .brand-count{background:rgba(0,0,0,0.2)}

/* Section header */
.section-header{max-width:480px;margin:16px auto 8px;padding:0 20px;display:flex;justify-content:space-between;align-items:center}
.section-title{font-size:13px;font-weight:700;color:#888;letter-spacing:0.5px;text-transform:uppercase}

/* Cards */
#cards{max-width:480px;margin:0 auto 100px;padding:0 20px}

/* Brand group */
.brand-group{margin-bottom:12px}
.brand-group-header{display:flex;align-items:center;gap:8px;padding:8px 0;cursor:pointer;user-select:none}
.brand-group-header img,.brand-group-header .brand-emoji{width:20px;height:20px;object-fit:contain}
.brand-group-name{font-size:13px;font-weight:700;color:#aaa}
.brand-group-count{font-size:11px;color:#555}
.brand-group-arrow{margin-left:auto;color:#555;font-size:11px;font-weight:700;width:20px;text-align:right}
.brand-group-cards{display:block}

/* Card */
.card-wrap{position:relative;overflow:hidden}
.card-wrap:first-child{border-radius:14px 14px 0 0}
.card-wrap:last-child{border-radius:0 0 14px 14px}
.card-wrap:only-child{border-radius:14px}
.delete-btn{position:absolute;right:0;top:0;bottom:0;width:72px;background:#E63946;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2}
.delete-btn strong{font-size:14px;color:#fff;font-weight:800}
.card{background:#111;padding:14px 0;cursor:pointer;display:flex;align-items:center;gap:14px;border-bottom:1px solid #1a1a1a;position:relative;transition:transform 0.25s ease;touch-action:pan-y;z-index:1}
.card.inactive{opacity:0.4;cursor:default}
.card-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;margin-left:14px;overflow:hidden}
.card-icon img{width:100%;height:100%;object-fit:contain}
.card-body{flex:1;min-width:0}
.card-brand{font-weight:700;font-size:15px;color:#f0f0f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-item{font-size:12px;color:#999;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-right{text-align:right;flex-shrink:0;margin-right:14px}
.card-date{font-size:11px;color:#777;margin-bottom:4px}
.dday{border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700;color:#000;display:inline-block}

#empty{text-align:center;padding:60px 0;display:none}
#empty p{font-size:14px;color:#444;margin-top:12px}

#fab{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);width:56px;height:56px;border-radius:50%;border:none;background:#C9A84C;color:#000;font-size:28px;box-shadow:0 4px 24px rgba(201,168,76,0.4);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50}
#fab:active{transform:translateX(-50%) scale(0.9)}

/* Modals */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:#161616;border-radius:24px 24px 0 0;padding:28px 24px 40px;width:100%;max-width:480px;box-shadow:0 -4px 40px rgba(0,0,0,0.6);max-height:92vh;overflow-y:auto}
.handle{width:36px;height:4px;background:#333;border-radius:2px;margin:0 auto 20px}
.sheet-title{font-weight:800;font-size:18px;margin-bottom:18px;color:#fff}

/* Barcode */
#barcode-wrap{background:#fff;border-radius:14px;padding:20px 16px 14px;margin-bottom:20px;text-align:center}
#barcode-canvas{display:block;margin:0 auto}
#barcode-number{font-size:20px;font-weight:700;color:#111;letter-spacing:5px;margin-top:10px;font-family:'Courier New',monospace}

/* View modal */
#view-header{display:flex;align-items:center;gap:14px;margin-bottom:20px}
#view-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}
#view-nav{display:none;justify-content:center;align-items:center;margin-bottom:12px;gap:8px}
.btn-row{display:flex;gap:10px}
.btn-cancel{flex:1;padding:13px 0;border-radius:12px;border:1px solid #2a2a2a;background:transparent;font-weight:600;font-size:15px;cursor:pointer;color:#666}
.btn-use{flex:2;padding:13px 0;border-radius:12px;border:none;background:#C9A84C;color:#000;font-weight:700;font-size:15px;cursor:pointer}

/* Forms */
.field{margin-bottom:14px}
.field label{font-size:11px;font-weight:700;color:#555;display:block;margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase}
.field input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #2a2a2a;background:#111;font-size:15px;outline:none;font-family:inherit;color:#fff}
.field input:focus{border-color:#C9A84C}
.cat-pills{display:flex;gap:8px;flex-wrap:wrap}
.cat-pill{padding:6px 14px;border-radius:20px;border:1px solid #2a2a2a;background:transparent;color:#555;font-weight:600;font-size:13px;cursor:pointer}
.btn-save{width:100%;padding:14px 0;border-radius:12px;border:none;background:#C9A84C;color:#000;font-weight:700;font-size:15px;cursor:pointer;margin-top:8px}
.upload-zone{border:1px dashed #2a2a2a;border-radius:16px;padding:40px 20px;text-align:center;cursor:pointer;background:#111}
.analyzing{text-align:center;padding:40px 0}
#add-error{background:#1a0a00;border:1px solid #3a1500;border-radius:8px;padding:8px 12px;font-size:13px;color:#FF8C42;margin-bottom:14px;display:none}
</style>
</head>
<body>

<div id="header">
  <div class="inner">
    <div>
      <div class="greeting">Hello 👋</div>
      <div class="title">Gift Box</div>
      <div class="subtitle" id="header-sub">로딩 중...</div>
    </div>
    <button class="settings-btn" onclick="openModal('settings-modal')">⚙️ 설정</button>
  </div>
</div>

<div id="summary">
  <div class="sum-card"><div class="sum-label">사용 가능</div><div class="sum-val" id="sum-active">0</div><div class="sum-sub">장</div></div>
  <div class="sum-card"><div class="sum-label">한달 내 만료</div><div class="sum-val" id="sum-month" style="color:#F4A261">0</div><div class="sum-sub">장</div></div>
  <div class="sum-card"><div class="sum-label">일주일 내 만료</div><div class="sum-val" id="sum-week" style="color:#FF8C42">0</div><div class="sum-sub">장</div></div>
</div>

<div id="alert-banner"><div id="alert-inner"></div></div>
<div id="brand-wrap"><div id="brands"></div></div>

<div class="section-header">
  <span class="section-title">보유 목록</span>
  <div style="display:flex;align-items:center;gap:10px">
    <button id="expired-btn" onclick="selectBrand('사용완료/만료')" style="display:none;font-size:12px;color:#888;background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:4px 12px;cursor:pointer">
      사용완료/만료 <span id="expired-count" style="color:#C9A84C"></span>
    </button>
    <button id="collapse-btn" onclick="collapseAll()" style="background:none;border:none;cursor:pointer;color:#666;font-size:11px;font-weight:700;padding:4px">∧</button>
  </div>
</div>

<div id="cards"></div>
<div id="empty"><div style="font-size:40px;opacity:0.4">🎁</div><p>기프티콘이 없어요</p></div>
<button id="fab" onclick="openModal('add-modal')">+</button>

<!-- View Modal -->
<div class="backdrop" id="view-modal" style="display:none" onclick="closeModal('view-modal')">
  <div class="sheet" onclick="event.stopPropagation()" ontouchstart="vts(event)" ontouchend="vte(event)">
    <div class="handle"></div>
    <div id="view-nav"></div>
    <div id="view-header">
      <div id="view-icon"></div>
      <div style="flex:1;min-width:0"><div id="view-brand"></div><div id="view-item-txt"></div></div>
      <span id="view-dday"></span>
    </div>
    <div id="view-img-wrap" style="display:none;margin-bottom:14px">
      <img id="view-img" style="width:100%;border-radius:12px;object-fit:contain;max-height:200px;cursor:pointer" onclick="toggleFullImg()">
      <div id="view-full-wrap" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:300;align-items:center;justify-content:center" onclick="toggleFullImg()">
        <img id="view-full-img" style="max-width:95vw;max-height:95vh;object-fit:contain">
      </div>
    </div>
    <div id="barcode-wrap">
      <canvas id="barcode-canvas" width="300" height="110"></canvas>
      <div id="barcode-number"></div>
    </div>
    <div class="btn-row" style="margin-bottom:10px">
      <button class="btn-cancel" onclick="openEditFromView()">수정</button>
      <button class="btn-use" onclick="useCurrentItem()">사용 완료</button>
    </div>
    <button onclick="closeModal('view-modal')" style="width:100%;padding:11px;border-radius:12px;border:1px solid #2a2a2a;background:transparent;color:#555;font-size:14px;cursor:pointer">닫기</button>
  </div>
</div>

<!-- Edit Modal -->
<div class="backdrop" id="edit-modal" style="display:none" onclick="closeModal('edit-modal')">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="handle"></div>
    <div class="sheet-title">수정하기</div>
    <div class="field"><label>브랜드</label><input id="e-brand"></div>
    <div class="field"><label>상품명</label><input id="e-item"></div>
    <div class="field"><label>유효기간</label><input id="e-expiry" type="date"></div>
    <div class="field"><label>바코드</label><input id="e-barcode"></div>
    <div class="field"><label>카테고리</label><div class="cat-pills" id="edit-cats"></div></div>
    <button class="btn-save" onclick="saveEdit()">저장하기</button>
  </div>
</div>

<!-- Add Modal -->
<div class="backdrop" id="add-modal" style="display:none" onclick="closeModal('add-modal')">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="handle"></div>
    <div class="sheet-title">기프티콘 추가</div>
    <div id="add-step-upload">
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(this)">
      <div class="upload-zone" onclick="document.getElementById('file-input').click()">
        <div style="font-size:40px;margin-bottom:12px;opacity:0.6">📷</div>
        <div style="font-weight:700;font-size:15px;color:#aaa">사진 촬영 또는 갤러리에서 선택</div>
        <div style="font-size:12px;color:#444;margin-top:6px">AI가 자동으로 정보를 읽어드려요</div>
      </div>
      <div style="text-align:center;margin-top:14px">
        <button onclick="openManualAdd()" style="background:none;border:none;color:#444;font-size:13px;cursor:pointer;text-decoration:underline">직접 입력하기</button>
      </div>
    </div>
    <div id="add-step-analyzing" style="display:none">
      <div class="analyzing">
        <img id="preview-img" alt="" style="width:100%;height:130px;object-fit:cover;border-radius:12px;margin-bottom:16px;display:none">
        <div style="font-size:28px;margin-bottom:10px">🔍</div>
        <div style="font-weight:700;font-size:15px;color:#aaa">분석 중...</div>
        <div style="margin-top:18px;display:flex;justify-content:center;gap:6px">
          <div class="dot" style="animation-delay:0s"></div>
          <div class="dot" style="animation-delay:0.2s"></div>
          <div class="dot" style="animation-delay:0.4s"></div>
        </div>
      </div>
    </div>
    <div id="add-step-result" style="display:none">
      <div id="add-error"></div>
      <img id="result-preview" alt="" style="width:100%;height:130px;object-fit:cover;border-radius:12px;margin-bottom:16px;display:none">
      <div class="field"><label>브랜드</label><input id="f-brand" placeholder="예: 스타벅스"></div>
      <div class="field"><label>상품명</label><input id="f-item" placeholder="예: 아메리카노 Tall"></div>
      <div class="field"><label>유효기간</label><input id="f-expiry" type="date"></div>
      <div class="field"><label>바코드</label><input id="f-barcode" placeholder="바코드 번호"></div>
      <div class="field"><label>카테고리</label><div class="cat-pills" id="add-cats"></div></div>
      <button class="btn-save" onclick="saveGifticon()">저장하기</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div class="backdrop" id="settings-modal" style="display:none" onclick="closeModal('settings-modal')">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="handle"></div>
    <div class="sheet-title">⚙️ 설정</div>
    <div style="margin-bottom:20px">
      <label style="font-size:11px;font-weight:700;color:#555;display:block;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px">만료 알림 주기</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap" id="notify-pills">
        <button class="cat-pill" onclick="setNotifyDays(1)">당일</button>
        <button class="cat-pill" onclick="setNotifyDays(3)">3일 전</button>
        <button class="cat-pill" onclick="setNotifyDays(7)">7일 전</button>
        <button class="cat-pill" onclick="setNotifyDays(14)">14일 전</button>
        <button class="cat-pill" onclick="setNotifyDays(30)">한달 전</button>
      </div>
    </div>
    <div style="margin-bottom:20px">
      <label style="font-size:11px;font-weight:700;color:#555;display:block;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px">푸시 알림</label>
      <button id="push-btn" onclick="togglePush()" style="width:100%;padding:13px;border-radius:12px;border:1px solid #2a2a2a;background:#111;color:#C9A84C;font-size:14px;font-weight:700;cursor:pointer">🔔 알림 허용하기</button>
      <div id="push-status" style="font-size:12px;color:#555;margin-top:8px;text-align:center"></div>
    </div>
    <div style="margin-bottom:20px;padding-top:20px;border-top:1px solid #222">
      <label style="font-size:11px;font-weight:700;color:#555;display:block;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px">Groq API 키 (AI 분석)</label>
      <input id="settings-api-key" placeholder="gsk_..." style="width:100%;padding:12px 14px;border-radius:10px;border:1px solid #2a2a2a;background:#111;font-size:13px;font-family:monospace;color:#C9A84C;outline:none">
      <div style="font-size:11px;color:#555;margin-top:6px"><a href="https://console.groq.com" target="_blank" style="color:#C9A84C">console.groq.com</a>에서 무료 발급</div>
    </div>
    <button class="btn-save" onclick="saveSettings()">저장하기</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// 상수
// ═══════════════════════════════════════════════
const SERVER = 'https://gifticon-server-1022344655863.asia-northeast3.run.app';
const SERVER_KEY = 'gifticon2026';
const SHEADERS = () => ({'Content-Type':'application/json','x-access-key':SERVER_KEY});

const CATS = {
  '교환권':{e:'🎫',c:'#1a0a00',l:'#FF6B35'},
  '상품권':{e:'🎟️',c:'#0a1a00',l:'#4CAF50'},
  '카페':{e:'☕',c:'#4a2c0a',l:'#C9A84C'},
  '음식':{e:'🍔',c:'#2a1000',l:'#FF6B35'},
  '편의점':{e:'🏪',c:'#0a1f0a',l:'#4CAF50'},
  '뷰티':{e:'💄',c:'#1f0a1f',l:'#C77DFF'},
  '패션':{e:'👗',c:'#0a0a2a',l:'#4895EF'},
  '식품':{e:'🥗',c:'#0a1a0a',l:'#66BB6A'},
  '주류':{e:'🍺',c:'#1a1000',l:'#FFC107'},
  '리빙':{e:'🛋️',c:'#1a1a0a',l:'#A5D6A7'},
  '레저·스포츠':{e:'⚽',c:'#0a1a1a',l:'#26C6DA'},
  '책·음반':{e:'📚',c:'#1a0a1a',l:'#AB47BC'},
  '유아동·반려':{e:'🐾',c:'#1a0f00',l:'#FF8A65'},
  '디지털·가전':{e:'📱',c:'#0a0a1a',l:'#42A5F5'},

// 서버 동기화
// ═══════════════════════════════════════════════
async function syncToServer() {
  try {
    await fetch(`${SERVER}/api/gifticons`, {
      method:'POST', headers:SHEADERS(),
      body:JSON.stringify(gifticons.map(g => ({...g, imageUrl:null})))
    });
  } catch(e) {}
}

async function loadFromServer() {
  try {
    const res = await fetch(`${SERVER}/api/gifticons`, {headers:SHEADERS()});
    if (!res.ok) return;
    const data = await res.json();
    if (Array.isArray(data) && data.length > gifticons.length) {
      gifticons = data;
      localStorage.setItem('gifticons', JSON.stringify(gifticons));
      render();
    }
  } catch(e) {}
}

function saveData() {
  localStorage.setItem('gifticons', JSON.stringify(gifticons));
  syncToServer();
}

// ═══════════════════════════════════════════════
// 유틸
// ═══════════════════════════════════════════════
function getDday(expiry) {
  const t = new Date(); t.setHours(0,0,0,0);
  return Math.ceil((new Date(expiry) - t) / 86400000);
}

function ddayHTML(expiry) {
  const d = getDday(expiry);
  if (d < 0)  return `<span class="dday" style="background:#333;color:#666">만료</span>`;
  if (d === 0) return `<span class="dday" style="background:#E63946">오늘!</span>`;
  if (d <= 7)  return `<span class="dday" style="background:#FF8C42">D-${d}</span>`;
  if (d <= 30) return `<span class="dday" style="background:#F4A261">D-${d}</span>`;
  return `<span class="dday" style="background:#2a2a2a;color:#666">D-${d}</span>`;
}

function dateStr(expiry) {
  const d = new Date(expiry);
  return `'${String(d.getFullYear()).slice(2)}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function iconHTML(brand, cat) {
  const logo = getLogo(brand);
  if (logo) return `<img src="${logo}" style="width:42px;height:42px;object-fit:contain">`;
  return `<span style="font-size:20px">${cat.e}</span>`;
}

// ═══════════════════════════════════════════════
// 렌더
// ═══════════════════════════════════════════════
function render() {
  const active = gifticons.filter(g => !g.used && getDday(g.expiry) >= 0);
  const week   = active.filter(g => getDday(g.expiry) <= 7);
  const month  = active.filter(g => getDday(g.expiry) <= 30);
  const expired = gifticons.filter(g => g.used || getDday(g.expiry) < 0);

  // Header
  document.getElementById('header-sub').textContent = `사용 가능 ${active.length}장`;
  document.getElementById('sum-active').textContent = active.length;
  document.getElementById('sum-week').textContent = week.length;
  document.getElementById('sum-month').textContent = month.length;

  // Alert
  const ab = document.getElementById('alert-banner');
  if (week.length > 0) {
    ab.style.display = 'block';
    document.getElementById('alert-inner').innerHTML = `⚠️ <strong>${week.length}장</strong>이 7일 안에 만료돼요!`;
  } else ab.style.display = 'none';

  // Expired quick btn
  const eb = document.getElementById('expired-btn');
  document.getElementById('expired-count').textContent = expired.length;
  eb.style.display = expired.length > 0 ? 'block' : 'none';
  eb.style.color = selectedBrand === '사용완료/만료' ? '#C9A84C' : '#888';

  // Brand tabs
  const brandCounts = {};
  active.forEach(g => { brandCounts[g.brand] = (brandCounts[g.brand]||0)+1; });
  document.getElementById('brands').innerHTML = [
    `<button class="brand-btn${selectedBrand==='전체'?' active':''}" onclick="selectBrand('전체')">전체 <span class="brand-count">${active.length}</span></button>`,
    ...Object.entries(brandCounts).map(([b,n]) => {
      const logo = getLogo(b);
      const logoHtml = logo ? `<img src="${logo}" style="width:16px;height:16px;object-fit:contain;border-radius:3px">` : '';
      return `<button class="brand-btn${selectedBrand===b?' active':''}" onclick="selectBrand('${b}')">${logoHtml}${b} <span class="brand-count">${n}</span></button>`;
    }),
    expired.length > 0 ? `<button class="brand-btn${selectedBrand==='사용완료/만료'?' active':''}" onclick="selectBrand('사용완료/만료')" style="${selectedBrand==='사용완료/만료'?'background:#444;border-color:#444;color:#fff':''}">사용완료/만료 <span class="brand-count">${expired.length}</span></button>` : ''
  ].join('');

  // Cards
  const filtered = gifticons.filter(g => {
    if (selectedBrand === '사용완료/만료') return g.used || getDday(g.expiry) < 0;
    if (g.used || getDday(g.expiry) < 0) return false;
    if (selectedBrand !== '전체' && g.brand !== selectedBrand) return false;
    return true;
  }).sort((a,b) => selectedBrand === '사용완료/만료' ? 0 : getDday(a.expiry) - getDday(b.expiry));

  const cardsEl = document.getElementById('cards');
  const emptyEl = document.getElementById('empty');

  if (filtered.length === 0) {
    cardsEl.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  // 전체 탭: 브랜드별 그룹핑
  if (selectedBrand === '전체') {
    const groups = {};
    filtered.forEach(g => { if (!groups[g.brand]) groups[g.brand]=[]; groups[g.brand].push(g); });

    cardsEl.innerHTML = Object.entries(groups).map(([brand, items]) => {
      const logo = getLogo(brand);
      const logoHtml = logo
        ? `<img src="${logo}" class="brand-emoji" style="width:20px;height:20px;object-fit:contain;border-radius:3px">`
        : `<span class="brand-emoji" style="font-size:18px">${(CATS[items[0].category]||CATS['기타']).e}</span>`;
      const collapsed = collapsedSet.has(brand);
      const arrow = collapsed ? '∨' : '∧';
      const cardsHtml = items.map((g,i) => cardHTML(g, i, items.length, brand)).join('');
      return `<div class="brand-group">
        <div class="brand-group-header" onclick="toggleBrand('${brand}')">
          ${logoHtml}
          <span class="brand-group-name">${brand}</span>
          <span class="brand-group-count">${items.length}장</span>
          <span id="arrow-${brand}" class="brand-group-arrow">${arrow}</span>
        </div>
        <div id="group-${brand}" class="brand-group-cards" style="display:${collapsed?'none':'block'}">${cardsHtml}</div>
      </div>`;
    }).join('');
  } else {
    cardsEl.innerHTML = filtered.map((g,i) => cardHTML(g, i, filtered.length, g.brand)).join('');
  }
}

function cardHTML(g, idx, total, brand) {
  const cat = CATS[g.category] || CATS['기타'];
  const inactive = g.used || getDday(g.expiry) < 0;
  const r1 = idx===0, r2 = idx===total-1;
  const rad = r1&&r2?'border-radius:14px':r1?'border-radius:14px 14px 0 0':r2?'border-radius:0 0 14px 14px':'';
  const bgColor = getLogo(g.brand) ? 'transparent' : cat.c;
  return `<div class="card-wrap" style="${rad}">
    <div class="card${inactive?' inactive':''}" id="card-${g.id}"
      ${!inactive?`onclick="cardClick(event,${g.id},'${brand}')"`:``}
      ontouchstart="ts(event,${g.id})" ontouchend="te(event,${g.id})"
      style="transform:translateX(0)">
      <div class="card-icon" style="background:${bgColor}">${iconHTML(g.brand, cat)}</div>
      <div class="card-body">
        <div class="card-brand">${g.brand}</div>
        <div class="card-item">${g.item}</div>
      </div>
      <div class="card-right">
        <div class="card-date">~${dateStr(g.expiry)}</div>
        ${inactive
          ? `<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
               <span style="font-size:11px;color:#555">${g.used?'사용완료':'만료'}</span>
               ${g.used?`<button onclick="restoreItem(${g.id})" style="background:none;border:1px solid #333;border-radius:6px;color:#888;font-size:10px;padding:2px 8px;cursor:pointer">취소</button>`:''}
             </div>`
          : ddayHTML(g.expiry)}
      </div>
    </div>
  </div>`;
}

function toggleBrand(brand) {
  if (collapsedSet.has(brand)) collapsedSet.delete(brand);
  else collapsedSet.add(brand);
  saveCollapsed();
  // DOM 직접 조작
  const grp = document.getElementById('group-' + brand);
  const arr = document.getElementById('arrow-' + brand);
  const collapsed = collapsedSet.has(brand);
  if (grp) grp.style.display = collapsed ? 'none' : 'block';
  if (arr) arr.textContent = collapsed ? '∨' : '∧';
}

function collapseAll() {
  allCollapsed = !allCollapsed;
  document.getElementById('collapse-btn').textContent = allCollapsed ? '∨' : '∧';
  document.querySelectorAll('[id^="group-"]').forEach(el => {
    const brand = el.id.slice(6);
    if (allCollapsed) collapsedSet.add(brand);
    else collapsedSet.delete(brand);
    el.style.display = allCollapsed ? 'none' : 'block';
    const arr = document.getElementById('arrow-' + brand);
    if (arr) arr.textContent = allCollapsed ? '∨' : '∧';
  });
  saveCollapsed();
}

// 스와이프 삭제

let sx=0, sy=0, moved=false, swipedId=null;

function ts(e, id) { sx=e.touches[0].clientX; sy=e.touches[0].clientY; moved=false; }
function te(e, id) {
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if (Math.abs(dy)>Math.abs(dx)||Math.abs(dx)<30) return;
  moved=true;
  const card=document.getElementById('card-'+id);
  if (!card) return;
  if (dx<0) {
    if (swipedId&&swipedId!==id) closeSwiped();
    card.style.transform='translateX(-72px)';
    showDel(id);
    swipedId=id;
  } else {
    closeSwiped();
  }
}
function showDel(id) {
  const wrap=document.getElementById('card-'+id)?.parentNode;
  if (!wrap||wrap.querySelector('.delete-btn')) return;
  const btn=document.createElement('div');
  btn.className='delete-btn';
  btn.innerHTML='<strong>삭제</strong>';
  btn.addEventListener('touchend',e=>{e.stopPropagation();e.preventDefault();deleteItem(id);});
  btn.onclick=e=>{e.stopPropagation();deleteItem(id);};
  wrap.appendChild(btn);
}
function closeSwiped() {
  if (!swipedId) return;
  const card=document.getElementById('card-'+swipedId);
  if (card) card.style.transform='';
  const wrap=card?.parentNode;
  wrap?.querySelector('.delete-btn')?.remove();
  swipedId=null;
}

function cardClick(e, id, brand) {
  if (moved){moved=false;return;}
  if (swipedId){closeSwiped();return;}
  currentBrandList = gifticons.filter(g=>g.brand===brand&&!g.used&&getDday(g.expiry)>=0)
                              .sort((a,b)=>getDday(a.expiry)-getDday(b.expiry));
  openViewModal(id);
}

function handleFile(input) {
  const file=input.files[0]; if(!file) return;
  currentPreviewUrl=URL.createObjectURL(file);
  document.getElementById('preview-img').src=currentPreviewUrl;
  document.getElementById('preview-img').style.display='block';
  showStep('analyzing');
  const key=getApiKey();
  if (!key){setTimeout(()=>{showErr('API 키가 없어요. 설정에서 입력해주세요.');showStep('result');},500);return;}
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const base64=e.target.result.split(',')[1];
      const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
        method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},
        body:JSON.stringify({model:'meta-llama/llama-4-scout-17b-16e-instruct',max_tokens:300,temperature:0,messages:[{role:'user',content:[
          {type:'image_url',image_url:{url:`data:${file.type||'image/jpeg'};base64,${base64}`}},
          {type:'text',text:`이 이미지는 한국 기프티콘입니다. JSON으로만 응답:\n{"brand":"브랜드명","item":"상품명","category":"카페/음식/편의점/뷰티/패션/식품/주류/리빙/레저·스포츠/책·음반/유아동·반려/디지털·가전/교환권/상품권/기타 중 하나","expiry":"YYYY-MM-DD","barcode":"숫자만"}`}
        ]}]})
      });
      const data=await res.json();
      const parsed=JSON.parse(data.choices[0].message.content.replace(/```json|```/g,'').trim());
      document.getElementById('f-brand').value=parsed.brand||'';
      document.getElementById('f-item').value=parsed.item||'';
      document.getElementById('f-expiry').value=parsed.expiry||'';
      document.getElementById('f-barcode').value=parsed.barcode||rand13();
      selectedAddCat=parsed.category||'기타';
      document.getElementById('result-preview').src=currentPreviewUrl;
      document.getElementById('result-preview').style.display='block';
      document.getElementById('add-error').style.display='none';
    }catch(err){
      showErr('분석 실패. 직접 입력해주세요.');
      document.getElementById('result-preview').src=currentPreviewUrl;
      document.getElementById('result-preview').style.display='block';
    }
    renderCatPills('add-cats',selectedAddCat,c=>{selectedAddCat=c;renderCatPills('add-cats',selectedAddCat,arguments.callee);});
    showStep('result');
  };
  reader.readAsDataURL(file);
}

function showErr(msg){const e=document.getElementById('add-error');e.textContent=msg;e.style.display='block';}
function rand13(){return String(Math.floor(Math.random()*9e12+1e12));}

async function saveGifticon() {
  const brand=document.getElementById('f-brand').value.trim();
  if(!brand){alert('브랜드명을 입력해주세요');return;}
  const barcode=document.getElementById('f-barcode').value||rand13();
  const dup=gifticons.find(g=>g.barcode===barcode&&!g.used);
  if(dup&&!confirm(`이미 등록된 기프티콘이에요!\n(${dup.brand} - ${dup.item})\n그래도 추가할까요?`)){closeModal('add-modal');return;}
  const newId=Date.now();

  // 이미지 저장 - 완료될 때까지 기다림
  let imageUrl = null;
  if(currentPreviewUrl){
    try{
      const res = await fetch(currentPreviewUrl);
      const blob = await res.blob();
      const base64 = await new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = e => resolve(e.target.result);
        r.onerror = reject;
        r.readAsDataURL(blob);
      });
      localStorage.setItem('img_'+newId, base64);
      imageUrl = 'local:'+newId;
    }catch(e){
      console.log('이미지 저장 실패:', e);
    }
  }

  gifticons.unshift({
    id:newId, brand,
    item:document.getElementById('f-item').value.trim()||'상품권',
    category:selectedAddCat,
    expiry:document.getElementById('f-expiry').value||'2099-12-31',
    barcode, imageUrl, used:false
  });
  saveData(); render(); closeModal('add-modal');
}

// ═══════════════════════════════════════════════
// 바코드
// ═══════════════════════════════════════════════
function drawBarcode(code) {
  const canvas = document.getElementById('barcode-canvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);

  const digits = code.replace(/\D/g, '');

  // EAN/Code128 스타일 - 숫자별 고정 패턴으로 실제 바코드처럼
  const digitBars = {
    '0': [3,2,1,1], '1': [2,2,2,1], '2': [2,1,2,2],
    '3': [1,4,1,1], '4': [1,1,3,2], '5': [1,2,3,1],
    '6': [1,1,1,4], '7': [1,3,1,2], '8': [1,2,1,3],
    '9': [3,1,1,2]
  };

  // 가드 바 + 데이터 바 + 가드 바
  let allBars = [1,1,1]; // 시작 가드
  for (let i = 0; i < digits.length; i++) {
    const bars = digitBars[digits[i]] || [2,2,1,1];
    allBars.push(...bars);
    if (i === Math.floor(digits.length/2) - 1) {
      allBars.push(1,1,1,1,1); // 중간 가드
    }
  }
  allBars.push(1,1,1); // 끝 가드

  const pad = 12;
  const barH = H - 20;
  const totalUnits = allBars.reduce((a, b) => a + b, 0);
  const unitW = (W - pad * 2) / totalUnits;
  let x = pad;

  allBars.forEach((units, i) => {
    ctx.fillStyle = i % 2 === 0 ? '#000' : '#fff';
    const bw = unitW * units;
    ctx.fillRect(Math.round(x), 0, Math.max(1, Math.round(bw)), barH);
    x += bw;
  });

  // 번호
  const fmt = digits.replace(/(\d{4})(?=\d)/g, '$1 ');
  document.getElementById('barcode-number').textContent = fmt;
}

async function saveSettings(){
  const key=document.getElementById('settings-api-key').value.trim();
  if(key) localStorage.setItem('groq_api_key',key);
  closeModal('settings-modal');render();
}

// 푸시
async function updatePushBtn(){
  const btn=document.getElementById('push-btn');
  const st=document.getElementById('push-status');
  if(!('Notification'in window)){btn.textContent='❌ 지원 안됨';btn.disabled=true;return;}
  if(Notification.permission==='granted'){
    const sw=await navigator.serviceWorker.ready;
    const sub=await sw.pushManager.getSubscription();
    btn.textContent=sub?'🔕 알림 끄기':'🔔 알림 켜기';
    btn.style.color=sub?'#E63946':'#C9A84C';
    if(st) st.textContent=sub?'푸시 알림이 켜져 있어요':'알림이 꺼져 있어요';
  }else if(Notification.permission==='denied'){
    btn.textContent='🚫 알림 차단됨';btn.style.color='#888';
  }else{btn.textContent='🔔 알림 허용하기';btn.style.color='#C9A84C';}
}

async function togglePush(){
  if(Notification.permission!=='granted'){
    const p=await Notification.requestPermission();
    if(p==='granted') await subscribePush();
    updatePushBtn();return;
  }
  const sw=await navigator.serviceWorker.ready;
  const sub=await sw.pushManager.getSubscription();
  if(sub){await sub.unsubscribe();}else{await subscribePush();}
  updatePushBtn();
}

async function subscribePush(){
  try{
    const res=await fetch(`${SERVER}/api/vapid-public-key`);
    const{key}=await res.json();if(!key)return;
    const sw=await navigator.serviceWorker.ready;
    const sub=await sw.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64(key)});
    await fetch(`${SERVER}/api/push-subscribe`,{method:'POST',headers:SHEADERS(),body:JSON.stringify(sub)});
  }catch(e){}
}

function urlB64(b){
  const p='='.repeat((4-b.length%4)%4);
  const b64=(b+p).replace(/-/g,'+').replace(/_/g,'/');
  return Uint8Array.from([...atob(b64)].map(c=>c.charCodeAt(0)));
}

// Service Worker
if('serviceWorker'in navigator){
  navigator.serviceWorker.register('/GiftICON/sw.js').then(r=>r.update()).catch(()=>{});
}

loadFromServer();
