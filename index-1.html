<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>기프티콘 지갑</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f5f5f7; min-height: 100vh; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-10px)} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .dot { width:8px;height:8px;border-radius:50%;background:#4895EF;display:inline-block;animation:bounce 1s infinite; }

  /* Header */
  #header { background:#1a1a2e;padding:52px 20px 24px;color:#fff; }
  #header .inner { max-width:480px;margin:0 auto; }
  #header .label { font-size:12px;color:#aaa;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px; }
  #header .count { font-size:26px;font-weight:800; }
  #alert-banner { margin-top:12px;background:rgba(255,107,53,0.2);border-radius:10px;padding:10px 14px;font-size:13px;color:#FF6B35;display:none; }

  /* API Key banner */
  #api-banner { background:#fff3cd;padding:10px 16px;text-align:center;font-size:13px;color:#856404;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap; }
  #api-banner button { background:#856404;color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer; }

  /* Category */
  #cat-wrap { overflow-x:auto;padding:16px 16px 0;max-width:480px;margin:0 auto; }
  #cat-wrap::-webkit-scrollbar{display:none;}
  #cats { display:flex;gap:8px;padding-bottom:4px; }
  .cat-btn { padding:7px 16px;border-radius:20px;border:none;white-space:nowrap;font-weight:600;font-size:13px;cursor:pointer;background:#fff;color:#555;box-shadow:0 1px 4px rgba(0,0,0,0.08);transition:all 0.15s; }
  .cat-btn.active { background:#1a1a2e;color:#fff; }

  /* Toggle */
  #toggle-wrap { max-width:480px;margin:10px auto 0;padding:0 16px;display:flex;justify-content:flex-end; }
  #toggle-used { font-size:12px;color:#999;background:none;border:none;cursor:pointer;text-decoration:underline; }

  /* Cards */
  #cards { max-width:480px;margin:12px auto 100px;padding:0 16px;display:flex;flex-direction:column;gap:12px; }
  .card { background:#fff;border-radius:18px;box-shadow:0 2px 12px rgba(0,0,0,0.08);padding:16px 18px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;position:relative;animation:fadeIn 0.3s ease; }
  .card:active { transform:scale(0.98); }
  .card.used,.card.expired { background:#f0f0f0;opacity:0.6;cursor:default; }
  .card-top { display:flex;align-items:center;gap:10px;margin-bottom:8px; }
  .card-emoji { font-size:26px; }
  .card-brand { font-weight:700;font-size:15px;color:#1a1a2e; }
  .card-item { font-size:13px;color:#666;margin-top:1px; }
  .card-bottom { display:flex;justify-content:space-between;align-items:center;margin-top:6px; }
  .card-date { font-size:12px;color:#999; }
  .card-status { position:absolute;top:12px;right:14px;font-size:11px;font-weight:700;color:#aaa;letter-spacing:1px; }
  .dday { border-radius:8px;padding:2px 10px;font-size:12px;font-weight:700;color:#fff; }

  /* Empty */
  #empty { text-align:center;padding:60px 0;color:#bbb;display:none; }
  #empty .icon { font-size:48px; }
  #empty p { margin-top:12px;font-size:15px; }
  #empty small { font-size:13px;margin-top:4px;display:block; }

  /* FAB */
  #fab { position:fixed;bottom:28px;left:50%;transform:translateX(-50%);width:60px;height:60px;border-radius:50%;border:none;background:#4895EF;color:#fff;font-size:32px;box-shadow:0 4px 20px rgba(72,149,239,0.5);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50;transition:transform 0.15s; }
  #fab:active { transform:translateX(-50%) scale(0.92); }

  /* Modal backdrop */
  .backdrop { position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:100;display:flex;align-items:flex-end;justify-content:center; }
  .sheet { background:#fff;border-radius:24px 24px 0 0;padding:28px 24px 40px;width:100%;max-width:480px;box-shadow:0 -8px 40px rgba(0,0,0,0.18);max-height:90vh;overflow-y:auto; }
  .handle { width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 20px; }
  .sheet-title { font-weight:800;font-size:18px;margin-bottom:18px;color:#1a1a2e; }

  /* Barcode */
  #barcode-canvas { display:block;margin:0 auto;border-radius:6px;border:1px solid #eee; }

  /* View modal */
  #view-header { display:flex;align-items:center;gap:12px;margin-bottom:20px; }
  #view-emoji { font-size:36px; }
  #view-brand { font-weight:800;font-size:20px;color:#1a1a2e; }
  #view-item { font-size:14px;color:#666; }
  #barcode-wrap { background:#f8f8f8;border-radius:14px;padding:18px 12px;margin-bottom:20px; }
  .btn-row { display:flex;gap:10px; }
  .btn-cancel { flex:1;padding:13px 0;border-radius:12px;border:1.5px solid #ddd;background:#fff;font-weight:600;font-size:15px;cursor:pointer;color:#555; }
  .btn-use { flex:2;padding:13px 0;border-radius:12px;border:none;color:#fff;font-weight:700;font-size:15px;cursor:pointer; }

  /* Add modal */
  .upload-zone { border:2px dashed #ddd;border-radius:16px;padding:40px 20px;text-align:center;cursor:pointer;background:#fafafa; }
  .upload-zone .icon { font-size:48px;margin-bottom:12px; }
  .upload-zone h3 { font-weight:700;font-size:16px;color:#333; }
  .upload-zone p { font-size:13px;color:#999;margin-top:6px; }
  .analyzing { text-align:center;padding:40px 0; }
  .analyzing .icon { font-size:32px;margin-bottom:12px; }
  #preview-img { width:100%;height:140px;object-fit:cover;border-radius:12px;margin-bottom:16px;display:none; }
  .field { margin-bottom:14px; }
  .field label { font-size:12px;font-weight:700;color:#888;display:block;margin-bottom:4px; }
  .field input { width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid #eee;font-size:15px;outline:none;font-family:inherit; }
  .field input:focus { border-color:#4895EF; }
  .cat-pills { display:flex;gap:8px;flex-wrap:wrap; }
  .cat-pill { padding:6px 14px;border-radius:20px;border:1.5px solid #eee;background:#fff;color:#555;font-weight:600;font-size:13px;cursor:pointer; }
  .cat-pill.active { color:#fff; }
  .btn-save { width:100%;padding:13px 0;border-radius:12px;border:none;background:#1a1a2e;color:#fff;font-weight:700;font-size:15px;cursor:pointer;margin-top:4px; }

  /* API key modal */
  #api-modal .sheet-title { margin-bottom:8px; }
  #api-modal p { font-size:13px;color:#888;margin-bottom:16px;line-height:1.6; }
  #api-modal .field input { font-size:13px;font-family:monospace; }
  #api-modal a { color:#4895EF; }
</style>
</head>
<body>

<!-- API Banner -->
<div id="api-banner">
  <span>⚠️ AI 분석 기능을 쓰려면 API 키가 필요해요</span>
  <button onclick="openApiModal()">키 입력하기</button>
</div>

<!-- Header -->
<div id="header">
  <div class="inner">
    <div class="label">내 지갑</div>
    <div class="count" id="count-text">기프티콘 0장</div>
    <div id="alert-banner"></div>
  </div>
</div>

<!-- Category Filter -->
<div id="cat-wrap">
  <div id="cats"></div>
</div>

<!-- Toggle used -->
<div id="toggle-wrap">
  <button id="toggle-used" onclick="toggleUsed()">사용완료 보기</button>
</div>

<!-- Cards -->
<div id="cards"></div>
<div id="empty">
  <div class="icon">🎁</div>
  <p>기프티콘이 없어요</p>
  <small>아래 + 버튼으로 추가해보세요</small>
</div>

<!-- FAB -->
<button id="fab" onclick="openAddModal()">+</button>

<!-- View Modal -->
<div class="backdrop" id="view-modal" style="display:none" onclick="closeViewModal()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="handle"></div>
    <div id="view-header">
      <span id="view-emoji"></span>
      <div>
        <div id="view-brand"></div>
        <div id="view-item"></div>
      </div>
      <span id="view-dday"></span>
    </div>
    <div id="barcode-wrap">
      <canvas id="barcode-canvas" width="280" height="80"></canvas>
    </div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeViewModal()">닫기</button>
      <button class="btn-use" id="btn-use-action" onclick="useCurrentItem()">사용 완료 처리</button>
    </div>
  </div>
</div>

<!-- Add Modal -->
<div class="backdrop" id="add-modal" style="display:none" onclick="closeAddModal()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="handle"></div>
    <div class="sheet-title">기프티콘 추가</div>

    <div id="add-step-upload">
      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(this)">
      <div class="upload-zone" onclick="document.getElementById('file-input').click()">
        <div class="icon">📷</div>
        <h3>사진 촬영 또는 갤러리에서 선택</h3>
        <p>AI가 자동으로 정보를 읽어드려요</p>
      </div>
      <div style="text-align:center;margin-top:16px">
        <button onclick="openManualAdd()" style="background:none;border:none;color:#999;font-size:13px;cursor:pointer;text-decoration:underline">직접 입력하기</button>
      </div>
    </div>

    <div id="add-step-analyzing" style="display:none">
      <div class="analyzing">
        <img id="preview-img" alt="">
        <div class="icon">🔍</div>
        <div style="font-weight:700;font-size:16px">AI가 분석 중이에요...</div>
        <div style="font-size:13px;color:#999;margin-top:6px">유효기간, 브랜드, 바코드를 읽고 있어요</div>
        <div style="margin-top:20px;display:flex;justify-content:center;gap:6px">
          <div class="dot" style="animation-delay:0s"></div>
          <div class="dot" style="animation-delay:0.2s"></div>
          <div class="dot" style="animation-delay:0.4s"></div>
        </div>
      </div>
    </div>

    <div id="add-step-result" style="display:none">
      <div id="add-error" style="background:#fff3cd;border-radius:8px;padding:8px 12px;font-size:13px;color:#856404;margin-bottom:14px;display:none"></div>
      <img id="result-preview" alt="" style="width:100%;height:140px;object-fit:cover;border-radius:12px;margin-bottom:16px;display:none">
      <div class="field"><label>브랜드</label><input id="f-brand" placeholder="예: 스타벅스"></div>
      <div class="field"><label>상품명</label><input id="f-item" placeholder="예: 아메리카노 Tall"></div>
      <div class="field"><label>유효기간</label><input id="f-expiry" type="date"></div>
      <div class="field"><label>바코드</label><input id="f-barcode" placeholder="바코드 번호"></div>
      <div class="field">
        <label>카테고리</label>
        <div class="cat-pills" id="cat-pills"></div>
      </div>
      <button class="btn-save" onclick="saveGifticon()">저장하기</button>
    </div>
  </div>
</div>

<!-- API Key Modal -->
<div class="backdrop" id="api-modal" style="display:none" onclick="closeApiModal()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="handle"></div>
    <div class="sheet-title">Google Gemini API 키</div>
    <p>AI 자동 분석 기능을 사용하려면 API 키가 필요해요.<br>
    <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a>에서 <strong>무료</strong>로 발급받을 수 있어요.</p>
    <div class="field"><label>API 키</label><input id="api-key-input" placeholder="AIza..."></div>
    <button class="btn-save" onclick="saveApiKey()">저장하기</button>
  </div>
</div>

<script>
const CATEGORIES = {
  "카페":   { emoji:"☕", color:"#6F4E37" },
  "음식":   { emoji:"🍔", color:"#E85D04" },
  "편의점": { emoji:"🏪", color:"#2D6A4F" },
  "뷰티":   { emoji:"💄", color:"#C77DFF" },
  "쇼핑":   { emoji:"🛍️", color:"#4895EF" },
  "기타":   { emoji:"🎁", color:"#8B8B8B" },
};

let gifticons = JSON.parse(localStorage.getItem('gifticons') || '[]');
let selectedCat = "전체";
let showUsed = false;
let currentViewId = null;
let selectedAddCat = "기타";
let currentPreviewUrl = null;

// 샘플 데이터 (처음 실행 시)
if (gifticons.length === 0) {
  gifticons = [
    { id:1, brand:"스타벅스", item:"아메리카노 Tall", category:"카페", expiry:"2025-08-15", barcode:"8801234567890", used:false },
    { id:2, brand:"올리브영", item:"3만원 금액권", category:"뷰티", expiry:"2025-07-05", barcode:"8809876543210", used:false },
    { id:3, brand:"CU", item:"1만원 금액권", category:"편의점", expiry:"2026-12-31", barcode:"8801111222333", used:false },
  ];
  saveData();
}

function saveData() {
  localStorage.setItem('gifticons', JSON.stringify(gifticons));
}

function getDday(expiry) {
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.ceil((new Date(expiry) - today) / 86400000);
}

function ddayHTML(expiry) {
  const d = getDday(expiry);
  if (d < 0) return `<span class="dday" style="background:#555">만료됨</span>`;
  if (d === 0) return `<span class="dday" style="background:#E63946">오늘 만료</span>`;
  if (d <= 7) return `<span class="dday" style="background:#FF6B35">D-${d}</span>`;
  if (d <= 30) return `<span class="dday" style="background:#F4A261">D-${d}</span>`;
  return `<span class="dday" style="background:#2D6A4F">D-${d}</span>`;
}

function render() {
  // Header
  const active = gifticons.filter(g => !g.used && getDday(g.expiry) >= 0);
  document.getElementById('count-text').textContent = `기프티콘 ${active.length}장`;
  const soon = active.filter(g => getDday(g.expiry) <= 7);
  const banner = document.getElementById('alert-banner');
  if (soon.length > 0) {
    banner.style.display = 'flex';
    banner.innerHTML = `⚠️ <strong style="margin:0 4px">${soon.length}장</strong>이 7일 안에 만료돼요!`;
  } else {
    banner.style.display = 'none';
  }

  // API banner
  document.getElementById('api-banner').style.display = getApiKey() ? 'none' : 'flex';

  // Categories
  const cats = document.getElementById('cats');
  const allCats = ["전체", ...Object.keys(CATEGORIES)];
  cats.innerHTML = allCats.map(c => {
    const cat = CATEGORIES[c];
    return `<button class="cat-btn${selectedCat===c?' active':''}" onclick="selectCat('${c}')">${cat ? cat.emoji+' '+c : c}</button>`;
  }).join('');

  // Cards
  const filtered = gifticons.filter(g => {
    if (!showUsed && (g.used || getDday(g.expiry) < 0)) return false;
    if (selectedCat !== "전체" && g.category !== selectedCat) return false;
    return true;
  });

  const cards = document.getElementById('cards');
  const empty = document.getElementById('empty');
  if (filtered.length === 0) {
    cards.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    cards.innerHTML = filtered.map(g => {
      const cat = CATEGORIES[g.category] || CATEGORIES["기타"];
      const expired = getDday(g.expiry) < 0;
      const cls = g.used ? 'used' : expired ? 'expired' : '';
      const clickable = !g.used && !expired;
      return `
        <div class="card ${cls}" style="border-left:5px solid ${cat.color}" ${clickable ? `onclick="openViewModal(${g.id})"` : ''}>
          ${g.used||expired ? `<div class="card-status">${g.used?'사용완료':'만료'}</div>` : ''}
          <div class="card-top">
            <span class="card-emoji">${cat.emoji}</span>
            <div>
              <div class="card-brand">${g.brand}</div>
              <div class="card-item">${g.item}</div>
            </div>
          </div>
          <div class="card-bottom">
            <span class="card-date">~${g.expiry}</span>
            ${!g.used ? ddayHTML(g.expiry) : ''}
          </div>
        </div>`;
    }).join('');
  }
}

function selectCat(c) { selectedCat = c; render(); }
function toggleUsed() {
  showUsed = !showUsed;
  document.getElementById('toggle-used').textContent = showUsed ? '사용완료 숨기기' : '사용완료 보기';
  render();
}

// View Modal
function openViewModal(id) {
  const g = gifticons.find(x => x.id === id);
  if (!g) return;
  currentViewId = id;
  const cat = CATEGORIES[g.category] || CATEGORIES["기타"];
  document.getElementById('view-emoji').textContent = cat.emoji;
  document.getElementById('view-brand').innerHTML = `<div style="font-weight:800;font-size:20px;color:#1a1a2e">${g.brand}</div>`;
  document.getElementById('view-item').innerHTML = `<div style="font-size:14px;color:#666">${g.item}</div>`;
  document.getElementById('view-dday').innerHTML = ddayHTML(g.expiry);
  document.getElementById('btn-use-action').style.background = cat.color;
  drawBarcode(g.barcode);
  document.getElementById('view-modal').style.display = 'flex';
}
function closeViewModal() { document.getElementById('view-modal').style.display = 'none'; }
function useCurrentItem() {
  gifticons = gifticons.map(g => g.id === currentViewId ? {...g, used:true} : g);
  saveData(); render(); closeViewModal();
}

function drawBarcode(code) {
  const canvas = document.getElementById('barcode-canvas');
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.fillStyle = '#fff'; ctx.fillRect(0,0,w,h);
  const bars = code.split('').map(c => parseInt(c)||1);
  let x = 10;
  const barW = (w-20)/(bars.length*2);
  bars.forEach((b,i) => {
    ctx.fillStyle = i%2===0?'#000':'#fff';
    const bh = h-20-(b%3)*4;
    ctx.fillRect(x, 10, barW*b*0.8+2, bh);
    x += barW*b*0.8+barW*0.5+2;
  });
  ctx.fillStyle='#333'; ctx.font='11px monospace'; ctx.textAlign='center';
  ctx.fillText(code, w/2, h-4);
}

// Add Modal
function openAddModal() {
  document.getElementById('add-modal').style.display = 'flex';
  showStep('upload');
  document.getElementById('file-input').value = '';
  currentPreviewUrl = null;
}
function closeAddModal() { document.getElementById('add-modal').style.display = 'none'; }
function showStep(step) {
  ['upload','analyzing','result'].forEach(s => {
    document.getElementById(`add-step-${s}`).style.display = s===step ? 'block' : 'none';
  });
}

function openManualAdd() {
  document.getElementById('add-error').style.display = 'none';
  document.getElementById('result-preview').style.display = 'none';
  document.getElementById('f-brand').value = '';
  document.getElementById('f-item').value = '';
  document.getElementById('f-expiry').value = '';
  document.getElementById('f-barcode').value = '';
  selectedAddCat = '기타';
  renderCatPills();
  showStep('result');
}

function renderCatPills() {
  document.getElementById('cat-pills').innerHTML = Object.entries(CATEGORIES).map(([k,v]) =>
    `<button class="cat-pill${selectedAddCat===k?' active':''}" style="${selectedAddCat===k?`background:${v.color};border-color:${v.color}`:'border-color:#eee'}" onclick="selectAddCat('${k}')">${v.emoji} ${k}</button>`
  ).join('');
}
function selectAddCat(c) { selectedAddCat = c; renderCatPills(); }

function handleFile(input) {
  const file = input.files[0];
  if (!file) return;
  currentPreviewUrl = URL.createObjectURL(file);
  const prev = document.getElementById('preview-img');
  prev.src = currentPreviewUrl;
  prev.style.display = 'block';
  showStep('analyzing');

  const apiKey = getApiKey();
  if (!apiKey) {
    // API 키 없으면 수동 입력으로
    setTimeout(() => {
      document.getElementById('add-error').textContent = 'API 키가 없어서 수동으로 입력해주세요.';
      document.getElementById('add-error').style.display = 'block';
      document.getElementById('result-preview').src = currentPreviewUrl;
      document.getElementById('result-preview').style.display = 'block';
      document.getElementById('f-brand').value = '';
      document.getElementById('f-item').value = '';
      document.getElementById('f-expiry').value = '';
      document.getElementById('f-barcode').value = '';
      selectedAddCat = '기타';
      renderCatPills();
      showStep('result');
    }, 800);
    return;
  }

  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result.split(',')[1];
    const mediaType = file.type || 'image/jpeg';
    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          contents:[{parts:[
            {inline_data:{mime_type:mediaType,data:base64}},
            {text:`이 이미지는 기프티콘(상품권)입니다. 다음 정보를 JSON으로만 응답해주세요. 다른 텍스트나 마크다운 없이 JSON만:\n{"brand":"브랜드명","item":"상품명 또는 금액","category":"카페/음식/편의점/뷰티/쇼핑/기타 중 하나","expiry":"YYYY-MM-DD 형식 유효기간 (없으면 null)","barcode":"바코드 숫자만 (없으면 임의 13자리)"}`}
          ]}],
          generationConfig:{temperature:0,maxOutputTokens:300}
        })
      });
      const data = await res.json();
      const text = data.candidates[0].content.parts[0].text;
      const clean = text.replace(/```json|```/g,'').trim();
      const parsed = JSON.parse(clean);
      document.getElementById('f-brand').value = parsed.brand || '';
      document.getElementById('f-item').value = parsed.item || '';
      document.getElementById('f-expiry').value = parsed.expiry || '';
      document.getElementById('f-barcode').value = parsed.barcode || String(Math.floor(Math.random()*9e12+1e12));
      selectedAddCat = parsed.category || '기타';
      document.getElementById('result-preview').src = currentPreviewUrl;
      document.getElementById('result-preview').style.display = 'block';
      document.getElementById('add-error').style.display = 'none';
    } catch(err) {
      document.getElementById('add-error').textContent = '분석에 실패했어요. 직접 입력해주세요.';
      document.getElementById('add-error').style.display = 'block';
      document.getElementById('result-preview').src = currentPreviewUrl;
      document.getElementById('result-preview').style.display = 'block';
    }
    renderCatPills();
    showStep('result');
  };
  reader.readAsDataURL(file);
}

function saveGifticon() {
  const brand = document.getElementById('f-brand').value.trim();
  const item = document.getElementById('f-item').value.trim();
  if (!brand) { alert('브랜드명을 입력해주세요'); return; }
  gifticons.unshift({
    id: Date.now(),
    brand,
    item: item || '상품권',
    category: selectedAddCat,
    expiry: document.getElementById('f-expiry').value || '2099-12-31',
    barcode: document.getElementById('f-barcode').value || String(Math.floor(Math.random()*9e12+1e12)),
    used: false,
  });
  saveData(); render(); closeAddModal();
}

// API Key
function getApiKey() { return localStorage.getItem('gemini_api_key') || ''; }
function openApiModal() {
  document.getElementById('api-key-input').value = getApiKey();
  document.getElementById('api-modal').style.display = 'flex';
}
function closeApiModal() { document.getElementById('api-modal').style.display = 'none'; }
function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (key) localStorage.setItem('gemini_api_key', key);
  closeApiModal(); render();
}

render();
</script>
